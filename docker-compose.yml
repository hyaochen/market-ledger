services:
  market-ledger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-ledger
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/dev.db
      PORT: 3000
    volumes:
      - ./docker-data:/app/data

  market-ledger-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-ledger-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/dev.db
      # 容器內連到 host 的 Ollama（Windows/Mac 用 host.docker.internal）
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./docker-data:/app/data
    depends_on:
      - market-ledger
    # 略過 next build，直接跑 bot
    command: ["node_modules/.bin/tsx", "bot/index.ts"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  market-ledger-tunnel:
    build:
      context: .
      dockerfile: Dockerfile.cloudflared
    container_name: market-ledger-tunnel
    restart: unless-stopped
    depends_on:
      - market-ledger
    command: tunnel --config /app/cloudflared-docker.yml run
    volumes:
      - ./cloudflared-docker.yml:/app/cloudflared-docker.yml:ro
      - ${CLOUDFLARED_DIR}:/etc/cloudflared:ro

